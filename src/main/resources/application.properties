spring.application.name=ExamEase

# Database Config (H2 for local)
spring.datasource.url=jdbc:h2:mem:exameasedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf cache disabled for dev
spring.thymeleaf.cache=false

# Force session tracking to cookie to prevent ;jsessionid in URL which causes 404 in Spring Boot 3
server.servlet.session.tracking-modes=cookie
