<!DOCTYPE html>
<html th:replace="~{fragments/layout :: html(content=~{::div.content})}">
<body>
<div class="content">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card shadow-lg border-0 glass-card" style="border-radius: 30px !important;">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-5">
                        <span style="font-size: 4rem;">💭</span>
                        <h2 class="fw-bold text-dark mt-2">How are you feeling today?</h2>
                        <p class="text-muted">Take a deep breath and check in with yourself.</p>
                    </div>
                    
                    <form th:action="@{/checkin}" th:object="${moodEntryDto}" method="post">
                        
                        <!-- Mood Selection -->
                        <div class="mb-5 p-4 rounded-4" style="background: rgba(255,255,255,0.4);">
                            <label class="form-label fs-5 fw-bold text-dark mb-3">1. Select your mood</label>
                            <div class="d-flex flex-wrap gap-2 justify-content-center">
                                <th:block th:each="mood : ${moods}">
                                    <input type="radio" class="btn-check" th:id="${mood}" th:value="${mood}" th:field="*{mood}">
                                    <label class="btn btn-outline-primary rounded-pill px-4 py-2 fw-semibold border-2" th:for="${mood}" th:text="${mood}"></label>
                                </th:block>
                            </div>
                            <div class="text-danger fw-bold text-center mt-2" th:if="${#fields.hasErrors('mood')}" th:errors="*{mood}"></div>
                        </div>

                        <!-- Triggers -->
                        <div class="mb-5 p-4 rounded-4" style="background: rgba(255,255,255,0.4);">
                            <label class="form-label fs-5 fw-bold text-dark mb-3">2. What's weighing on your mind? <span class="text-muted fs-6 fw-normal">(Select all that apply)</span></label>
                            <div class="d-flex flex-wrap gap-3">
                                <th:block th:each="trigger : ${triggers}">
                                    <div class="form-check border-0 shadow-sm p-3 rounded-4 flex-grow-1" style="background: white;">
                                        <input class="form-check-input ms-1" type="checkbox" th:id="${trigger}" th:value="${trigger}" th:field="*{triggers}">
                                        <label class="form-check-label ms-2 fw-semibold" th:for="${trigger}" th:text="${trigger.displayValue}"></label>
                                    </div>
                                </th:block>
                            </div>
                        </div>

                        <!-- Reflection -->
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label for="bothersomeNote" class="form-label fw-bold text-dark">3. What is bothering you today? (Optional)</label>
                                <textarea class="form-control rounded-4 p-3 border-0 shadow-sm" id="bothersomeNote" rows="3" th:field="*{bothersomeNote}" placeholder="Write your reflections here..." style="background: rgba(255,255,255,0.8);"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label for="helpfulNote" class="form-label fw-bold text-dark">4. What helped you today? (Optional)</label>
                                <textarea class="form-control rounded-4 p-3 border-0 shadow-sm" id="helpfulNote" rows="3" th:field="*{helpfulNote}" placeholder="Reflect on positive moments..." style="background: rgba(255,255,255,0.8);"></textarea>
                            </div>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary btn-lg shadow-lg py-3 fs-5" style="border-radius: 20px;">Save Check-in & Get Support 🌟</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
