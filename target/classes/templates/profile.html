<!DOCTYPE html>
<html th:replace="~{fragments/layout :: html(content=~{::div.content})}">
<body>
<div class="content">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 glass-card" style="border-radius: 30px !important;">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <span style="font-size: 4rem;" aria-hidden="true">🎓</span>
                        <h2 class="fw-bold text-dark mt-3">Welcome to ExamEase</h2>
                        <p class="text-muted">Let's personalize your wellness journey.</p>
                    </div>

                    <form th:action="@{/profile/setup}" th:object="${profile}" method="post">
                        <div class="mb-4">
                            <label for="name" class="form-label fw-bold">What should we call you?</label>
                            <input type="text" class="form-control p-3 rounded-4 border-0 shadow-sm" id="name" th:field="*{name}" placeholder="e.g. Alex" required style="background: rgba(255,255,255,0.8);">
                        </div>
                        
                        <div class="mb-4">
                            <label for="examType" class="form-label fw-bold">Which exam are you preparing for?</label>
                            <select class="form-select p-3 rounded-4 border-0 shadow-sm" id="examType" th:field="*{examType}" required style="background: rgba(255,255,255,0.8);">
                                <option value="" disabled selected>Select an exam</option>
                                <option value="JEE">JEE (Engineering)</option>
                                <option value="NEET">NEET (Medical)</option>
                                <option value="UPSC">UPSC (Civil Services)</option>
                                <option value="CAT">CAT (Management)</option>
                                <option value="GATE">GATE (Engineering)</option>
                                <option value="CUET">CUET (Undergraduate)</option>
                                <option value="Board Exams">Class 10/12 Board Exams</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary btn-lg shadow py-3 rounded-pill fw-bold fs-5">Start Tracking <span aria-hidden="true">✨</span></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
