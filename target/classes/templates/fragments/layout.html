<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamEase - Mental Wellness</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fs-4" href="/">✨ ExamEase</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link px-3" href="/">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="/checkin">Check-in</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3 text-danger fw-bold" href="/support">Support ❤️</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5" style="max-width: 1000px;">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm border-0" role="alert" style="border-radius: 15px; background: rgba(132, 250, 176, 0.8); color: #1a5c38; backdrop-filter: blur(10px);">
        <strong th:text="${successMessage}"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    
    <div th:replace="${content}"></div>
</div>

<footer class="text-center py-4 mt-auto">
    <div class="container">
        <p class="mb-0 fw-semibold" style="font-size: 0.85rem;">Disclaimer: ExamEase is a self-reflection tool and not a substitute for professional medical advice. If you are in crisis, please seek immediate help.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
